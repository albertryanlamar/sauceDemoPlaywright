name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      NODE_ENV: uat

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    # 2️⃣ Create report folders so JSON and HTML have a place
    - name: Create report folders
      run: |
        mkdir -p report/html-report report/allure-report report/json-report report/allure-results

    # Build Docker image
    - name: Build Docker Image
      run: docker build -t playwright-tests .
    
      # Check reports folder
    - name: Check reports folder
      run: |
        ls -R report
    
      # Run tests inside Docker container
    - name: Run Playwright tests in Docker
      run: |
        docker run \
        -v ${{ github.workspace }}/report:/usr/src/app/report \
        playwright-tests
        
    - name: Upload reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: report
