name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      NODE_ENV: uat

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 🧹 CLEAN SLATE - BUONG REPORT FOLDER BAGO MAG-TEST
    - name: Clean everything before tests
      run: |
        echo "🧹 COMPLETE CLEANUP..."
        rm -rf ${{ github.workspace }}/report/
        mkdir -p ${{ github.workspace }}/report/allure-results
        mkdir -p ${{ github.workspace }}/report/html-report
        mkdir -p ${{ github.workspace }}/report/junit-report
        mkdir -p ${{ github.workspace }}/report/json-report
        chmod -R 777 ${{ github.workspace }}/report/
        echo "✅ Clean slate ready"

    # Build Docker image
    - name: Build Docker Image
      run: docker build -t playwright-tests .

    # 🔍 DEBUG: Check allure-playwright installation
    - name: Verify allure-playwright in Docker
      run: |
        docker run --rm playwright-tests sh -c "
          echo '=== ALLURE-PLAYWRIGHT VERSION ==='
          npm list allure-playwright
          echo ''
          echo '=== PLAYWRIGHT CONFIG ==='
          cat playwright.config.ts | grep -A 10 reporter
        "

    # 🚀 RUN TESTS
    - name: Run Playwright tests
      run: |
        docker run \
        -v ${{ github.workspace }}/report:/usr/src/app/report \
        playwright-tests

    # ✅ VERIFY RESULTS
    - name: Verify test results
      if: always()
      run: |
        echo "=== TEST RESULTS VERIFICATION ==="
        echo ""
        echo "📊 ALLURE RESULTS:"
        ls -la ${{ github.workspace }}/report/allure-results/ || echo "❌ No allure results"
        echo "JSON files: $(find ${{ github.workspace }}/report/allure-results -name '*.json' 2>/dev/null | wc -l)"
        echo ""
        echo "📈 HTML REPORT:"
        ls -la ${{ github.workspace }}/report/html-report/ || echo "❌ No HTML report"
        echo ""
        echo "📋 JUNIT REPORT:"
        ls -la ${{ github.workspace }}/report/junit-report/ || echo "❌ No JUnit report"
        
    # 📦 UPLOAD ARTIFACT
    - name: Upload reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: ${{ github.workspace }}/report/
        retention-days: 60