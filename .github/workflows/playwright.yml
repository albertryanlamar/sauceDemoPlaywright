name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      NODE_ENV: uat

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 🧹 CLEAN AND CREATE REPORT FOLDERS (isang step na lang)
    - name: Setup report directories
      run: |
        echo "🧹 Setting up fresh report directories..."
        # Create main report folder
        mkdir -p ${{ github.workspace }}/report
        
        # Delete and recreate all report subfolders
        rm -rf ${{ github.workspace }}/report/html-report
        rm -rf ${{ github.workspace }}/report/allure-report
        rm -rf ${{ github.workspace }}/report/json-report
        rm -rf ${{ github.workspace }}/report/junit-report
        rm -rf ${{ github.workspace }}/report/allure-results
        
        # Create fresh folders
        mkdir -p ${{ github.workspace }}/report/html-report
        mkdir -p ${{ github.workspace }}/report/allure-report
        mkdir -p ${{ github.workspace }}/report/json-report
        mkdir -p ${{ github.workspace }}/report/junit-report
        mkdir -p ${{ github.workspace }}/report/allure-results
        
        # Set permissions
        chmod -R 777 ${{ github.workspace }}/report/
        
        echo "✅ Report directories ready"
        echo ""
        echo "=== Verification ==="
        ls -la ${{ github.workspace }}/report/

    # Build Docker image
    - name: Build Docker Image
      run: docker build -t playwright-tests .
    
      # Check reports folder
    - name: Check reports folder
      run: |
        ls -R report
    
      # Run tests inside Docker container
    - name: Run Playwright tests in Docker
      run: |
        docker run \
        -v ${{ github.workspace }}/report:/usr/src/app/report \
        playwright-tests
        
    - name: Upload reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: report
