name: Publish Report

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed

defaults:
  run:
    shell: bash

permissions:
  actions: read
  contents: write  # para makapag-push sa gh-pages

jobs:
  publish_report:
    name: Publish Report to GitHub Pages
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true

    env:
      REPORT_PATH: reports/${{ github.event.workflow_run.head_branch }}/${{ github.event.workflow_run.id }}

    steps:
      # 1️⃣ Checkout gh-pages branch
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      # 2️⃣ Configure git user
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # 3️⃣ Download reports artifact
      - name: Download reports artifact
        uses: actions/download-artifact@v4
        with:
          name: reports
          path: report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣ Install Allure CLI
      - name: Install Allure CLI
        run: |
          sudo apt-add-repository ppa:qameta/allure -y
          sudo apt-get update
          sudo apt-get install allure -y

      # 5️⃣ Generate Allure HTML
      - name: Generate Allure HTML
        run: |
          allure generate report/allure-results -o report/allure-report --clean

      # 6️⃣ Copy custom dashboard index.html
      - name: Copy custom dashboard
        run: cp .github/scripts/index.html .

      # 7️⃣ Commit and push all changes to gh-pages
      - name: Commit and push
        timeout-minutes: 3
        run: |
          git add index.html report/
          [ -f tests.html ] && git add tests.html || true
          [ -f dashboard.json ] && git add dashboard.json || true
          git commit -m "ci: add report for run ${{ github.event.workflow_run.id }}" || echo "No changes to commit"
          git push

      # 8️⃣ Annotate workflow with GitHub Pages URL
      - name: Annotate workflow with dashboard URL
        run: |
          echo "::notice title=📋 Playwright Dashboard::https://${{ github.repository_owner }}.github.io/${{ github.repository }}/"