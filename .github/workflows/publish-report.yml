name: Publish Report

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed

permissions:
  actions: read
  contents: write  # para makapag-push sa gh-pages

jobs:
  publish_report:
    name: Publish Report to GitHub Pages
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Download reports artifact
      - name: Download reports artifact
        uses: actions/download-artifact@v4
        with:
          name: reports
          path: report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 3️⃣ Ensure index.html exists (to avoid 404)
      - name: Ensure index.html
        run: |
          if [ ! -f report/index.html ]; then
            echo "<!DOCTYPE html>
            <html>
            <head><title>Playwright Dashboard</title></head>
          <body>
          <h1>Dashboard will appear here</h1>
          <ul>
          <li><a href='html-report/index.html'>HTML Report</a></li>
          <li><a href='allure-results/index.html'>Allure Report</a></li>
          <li><a href='junit-report/junit.xml'>JUnit XML</a></li>
          </ul>
          </body>
          </html>" > report/index.html
          fi

      # 4️⃣ Commit and push all reports + dashboard
      - name: Commit and push to gh-pages
        timeout-minutes: 3
        run: |
          git switch gh-pages || git checkout -b gh-pages
          git add report/* index.html tests.html dashboard.json
          [ -d failure-archive ] && git add failure-archive/ || true
          [ -d test-runs ] && git add test-runs/ || true
          git diff --cached --quiet || git commit -m "ci: add report for run ${{ github.event.workflow_run.id }}"
          until git push origin gh-pages; do
            git pull --rebase || { echo "Rebase failed. Manual review required."; exit 1; }
          done

      # 5️⃣ Annotate workflow with dashboard URL
      - name: Annotate workflow with dashboard URL
        run: |
          echo "::notice title=📋 Playwright Dashboard::https://${{ github.repository_owner }}.github.io/${{ github.repository }}/"