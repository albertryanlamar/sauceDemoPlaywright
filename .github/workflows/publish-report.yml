name: Publish Report

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed

defaults:
  run:
    shell: bash

permissions:
  actions: read
  contents: write  # para makapag-push sa gh-pages

jobs:
  publish_report:
    name: Publish Report to GitHub Pages
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true

    env:
      REPORT_PATH: reports/${{ github.event.workflow_run.head_branch }}/${{ github.event.workflow_run.id }}

    steps:
      # 1️⃣ Checkout gh-pages branch
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      # 2️⃣ Configure git user
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # 3️⃣ Download reports artifact
      - name: Download reports artifact
        uses: actions/download-artifact@v4
        with:
          name: reports
          path: report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣ Copy custom dashboard HTML from main branch
      - name: Copy custom dashboard
        run: |
          git fetch origin main
          git checkout origin/main -- .github/scripts/index.html
          cp .github/scripts/index.html .

      # 5️⃣ Regenerate dashboard JSON (optional, kung meron kang generate-dashboard.js)
      - name: Regenerate dashboard JSON
        env:
          GENERATE_JSON: ${{ secrets.GENERATE_JSON }}
        run: |
          if [ "$GENERATE_JSON" = "true" ]; then
          curl -fsSL \
          https://raw.githubusercontent.com/${{ github.repository }}/main/.github/scripts/generate-dashboard.js \
          -o generate-dashboard.js
          node generate-dashboard.js
          else
          echo "Skipping dashboard generation"
          fi

      # 6️⃣ Commit and push all changes to gh-pages
      - name: Commit and push
        timeout-minutes: 3
        run: |
          git add index.html reports/
          [ -f tests.html ] && git add tests.html || true
          [ -f dashboard.json ] && git add dashboard.json || true
          git commit -m "ci: add report for run ${{ github.event.workflow_run.id }}" || echo "No changes to commit"
          git push

      # 7️⃣ Annotate workflow with GitHub Pages URL
      - name: Annotate workflow with dashboard URL
        run: |
          echo "::notice title=📋 Playwright Dashboard::https://${{ github.repository_owner }}.github.io/${{ github.repository }}/"