name: Publish Report

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed

jobs:
  publish_report:
    name: Publish Report to GitHub Pages
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      NODE_ENV: uat

    steps:
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: report/allure-results

      - name: Download Playwright HTML report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: report/html-report

      - name: Download JUnit report
        uses: actions/download-artifact@v4
        with:
          name: junit-report
          path: report/junit-report

      - name: Publish Reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report
          destination_dir: playwright-report
          user_name: 'github-actions[bot]'
          user_email: '41898282+github-actions[bot]@users.noreply.github.com'