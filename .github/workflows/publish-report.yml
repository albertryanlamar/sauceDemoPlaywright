name: Publish Report

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed

permissions:
  actions: read
  contents: write  # para makapag-push sa gh-pages

jobs:
  publish_report:
    name: Publish Report to GitHub Pages
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Download reports artifact
      - name: Download reports artifact
        uses: actions/download-artifact@v4
        with:
          name: reports
          path: report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 3️⃣ Ensure index.html exists (to avoid 404)
      - name: Commit and push to gh-pages
        timeout-minutes: 3
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch gh-pages || git checkout -b gh-pages
          # Copy dashboard index.html to root
          cp report/index.html ./index.html

          # Add everything
          git add index.html report/

          # Commit only if there are changes
          git diff --cached --quiet || git commit -m "ci: add report for run ${{ github.event.workflow_run.id }}"

          # Push to gh-pages
          until git push origin gh-pages; do
            git pull --rebase || { echo "Rebase failed. Manual review required."; exit 1; }
          done