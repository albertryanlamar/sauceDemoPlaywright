name: Publish Report

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed

defaults:
  run:
    shell: bash

permissions:
  actions: read
  contents: write

jobs:
  publish_report:
    name: Publish Report to GitHub Pages
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true

    env:
      REPORT_PATH: reports/${{ github.event.workflow_run.head_branch }}/${{ github.event.workflow_run.id }}

    steps:
      # Checkout gh-pages branch
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      # Configure git user
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
     
      # Download reports artifact
      - name: Download reports artifact
        uses: actions/download-artifact@v4
        with:
          name: reports
          path: report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 🗑️ BURAHIN ANG BUONG REPORT FOLDER (para sigurado)
      - name: Delete old report folder
        run: |
          echo "🗑️ Deleting old report folder..."
          rm -rf ./report
          echo "✅ Old report deleted"
          
          # Gumawa ng bagong report folder
          mkdir -p ./report
          echo "✅ Fresh report folder created"

      # Install Allure
      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      # Generate Allure HTML (gamit ang bagong download)
      - name: Generate Allure HTML
        run: |
          echo "📊 Generating Allure report..."
          allure generate report/allure-results -o report/allure-report --clean
          echo "✅ Allure report generated"

      # Copy custom dashboard
      - name: Copy custom dashboard
        run: cp .github/scripts/index.html . || echo "No custom dashboard"
      
      # Update timestamp
      - name: Update timestamp
        run: |
          echo "Last updated: $(date)" > last-updated.txt
        
      # ✅ ITO AY DAPAT NASA LABAS NG UPDATE TIMESTAMP STEP
      # Commit and push all changes to gh-pages
      - name: Commit and push
        timeout-minutes: 3
        run: |
          git add index.html report/
          [ -f tests.html ] && git add tests.html || true
          [ -f dashboard.json ] && git add dashboard.json || true
          git commit -m "ci: Update report for run ${{ github.event.workflow_run.id }}" || echo "No changes to commit"
          git push

      # Annotate workflow
      - name: Annotate workflow
        run: |
          REPO_NAME="${{ github.repository }}"
          REPO_NAME=${REPO_NAME##*/}
          echo "::notice title=📋 Playwright Dashboard::https://${{ github.repository_owner }}.github.io/$REPO_NAME/"