name: Publish Report

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types:
      - completed

defaults:
  run:
    shell: bash

permissions:
  actions: read
  contents: write  # para makapag-push sa gh-pages

jobs:
  publish_report:
    name: Publish Report to GitHub Pages
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true

    env:
      REPORT_PATH: reports/${{ github.event.workflow_run.head_branch }}/${{ github.event.workflow_run.id }}

    steps:
      # 1️⃣ Checkout gh-pages branch
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      # 2️⃣ Configure git user
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
     
      # 3️⃣ Download reports artifact (UNAHIN NATIN ITO)
      - name: Download reports artifact
        uses: actions/download-artifact@v4
        with:
          name: reports
          path: report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣ Clean old reports (PAGKATAPOS NG DOWNLOAD)
      - name: Clean old reports only
        run: |
          echo "=== Removing old report directories ==="
          # Remove specific folders
          rm -rf ./html-report
          rm -rf ./allure-report
          rm -rf ./junit-report
          rm -rf ./json-report
          echo "✅ Old reports removed"

      # 5️⃣ Install Allure
      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline --save-dev

      # 6️⃣ Generate Allure HTML
      - name: Generate Allure HTML
        run: |
          allure generate report/allure-results -o report/allure-report --clean

      # 7️⃣ Copy custom dashboard index.html
      - name: Copy custom dashboard
        run: cp .github/scripts/index.html .
      
      # 8️⃣ Force change para laging may commit
      - name: Update timestamp
        run: |
          echo "Last updated: $(date)" > last-updated.txt

      # 9️⃣ Commit and push all changes to gh-pages
      - name: Commit and push
        timeout-minutes: 3
        run: |
          git add index.html report/
          [ -f tests.html ] && git add tests.html || true
          [ -f dashboard.json ] && git add dashboard.json || true
          git commit -m "ci: Update report for run ${{ github.event.workflow_run.id }}" || echo "No changes to commit"
          git push

      # 🔟 Annotate workflow with GitHub Pages URL
      - name: Annotate workflow with dashboard URL
        run: |
          echo "::notice title=📋 Playwright Dashboard::https://${{ github.repository_owner }}.github.io/${{ github.repository }}/"