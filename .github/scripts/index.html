<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playwright Reports Dashboard</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f4f4f4; }
    h1 { color: #222; }
    .run-card { background: #fff; padding: 1rem; margin: 1rem 0; border-radius: 8px; box-shadow: 0 0 5px #ccc; }
  </style>
</head>
<body>
  <h1>Playwright Reports Dashboard</h1>
  <div id="run-history">
    <!-- Simplified: only show run IDs -->
  </div>

  <script>
    const runs = [
      { id: 1, status: 'passed' },
      { id: 2, status: 'failed' }
      // Add more runs manually or dynamically later
    ];

    const container = document.getElementById('run-history');
    container.innerHTML = '';
    runs.forEach(run => {
      const div = document.createElement('div');
      div.className = 'run-card';
      div.innerHTML = `<strong>Run ID: ${run.id}</strong> - Status: ${run.status}`;
      container.appendChild(div);
    });
  </script>
</body>
</html>
